name: build-playerbots-images
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache /usr/share/dotnet /opt/ghc
          df -h /

      - name: Checkout (for patch script)
        uses: actions/checkout@v4

      - name: Clone Playerbot core fork
        run: |
          git clone --depth 1 --branch Playerbot https://github.com/liyunfan1223/azerothcore-wotlk.git ac
          cd ac/modules
          git clone --depth 1 https://github.com/liyunfan1223/mod-playerbots.git
          # pin mod-ollama-chat：注入补丁按锚点匹配，上游漂移会导致锚点失效，锁死已验证 commit
          git clone https://github.com/DustinHendrickson/mod-ollama-chat.git
          git -C mod-ollama-chat checkout 8ba5e791f0a84ee04636f0b19b62d3c4aff3dce1

      - name: Patch login banner (remove attribution spam)
        run: python3 scripts/patch_login_banner.py ac

      - name: Patch ChannelMgr (expose GetChannels)
        run: python3 scripts/patch_channelmgr.py ac

      - name: Inject drama director module
        run: python3 scripts/inject_drama_module.py ac

      - name: Inject long-term memory module
        run: python3 scripts/inject_memory_module.py ac

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build images
        working-directory: ac
        run: |
          docker compose build ac-worldserver ac-authserver ac-db-import
          docker image ls | head -10

      - name: Tag and push
        run: |
          for svc in worldserver authserver db-import; do
            SRC=$(docker image ls --format '{{.Repository}}:{{.Tag}}' | grep "ac-wotlk-$svc" | head -1)
            docker tag "$SRC" ghcr.io/shushuitie2017/ac-wotlk-$svc:playerbots
            docker push ghcr.io/shushuitie2017/ac-wotlk-$svc:playerbots
          done
